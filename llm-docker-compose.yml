name: 'llm'

services:
  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    volumes:
      - ${VOLUMES_BASEDIR}/hermes/home:/home/hermes/.hermes
      - hermes-agent-src:/opt/hermes
    environment:
      # Maps files created inside the container to your local user UID/GID
      - HERMES_UID=${PUID:-1000}
      - HERMES_GID=${PGID:-1000}

      - HERMES_HOME=/home/hermes/.hermes
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_TUI=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119

      # --- REQUIRED SECURITY GATE CREDENTIALS ---
      # Define a username and password to satisfy the 0.0.0.0 bind gate
      - HERMES_DASHBOARD_BASIC_AUTH_USERNAME=${HERMES_DASHBOARD_USERNAME}
      - HERMES_DASHBOARD_BASIC_AUTH_PASSWORD=${HERMES_DASHBOARD_PASSWORD}

      # Generates a stable session signing secret so you do not get logged out on restarts.
      # Ideally, generate a unique key using `openssl rand -hex 32`
      - HERMES_DASHBOARD_BASIC_AUTH_SECRET=${HERMES_DASHBOARD_SECRET}
      # ------------------------------------------      
    networks:
      - proxy_proxy-net

  hermes-webui:
    image: ghcr.io/nesquena/hermes-webui:latest
    container_name: hermes-webui
    restart: unless-stopped
    volumes:
      - ${VOLUMES_BASEDIR}/hermes/home:/home/hermeswebui/.hermes
      - hermes-agent-src:/home/hermeswebui/.hermes/hermes-agent:ro
      - ${VOLUMES_BASEDIR}/hermes/workspace:/workspace # Mounts the local host directory for easy file access
    environment:
      - WANTED_UID=${PUID:-1000}
      - WANTED_GID=${PGID:-1000}

      - HERMES_WEBUI_HOST=0.0.0.0
      - HERMES_WEBUI_PORT=8787
      - HERMES_WEBUI_STATE_DIR=/home/hermeswebui/.hermes/webui
      
      # If you expose the WebUI outside of localhost, uncomment and set a password:
      # - HERMES_WEBUI_PASSWORD=change-me-to-a-strong-password
    depends_on:
      - hermes-agent
    networks:
      - proxy_proxy-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL}
      - WEBUI_AUTH=False
    volumes:
      - ${VOLUMES_BASEDIR}/open_webui/data:/app/backend/data
      - ${VOLUMES_BASEDIR}/open_webui/cache:/root/.cache
    networks:
      - proxy_proxy-net

  mcpo:
    image: ghcr.io/open-webui/mcpo:main
    container_name: mcpo-server
    restart: unless-stopped
    volumes:
      - ${VOLUMES_BASEDIR}/mcps/config.json:/app/config.json
    command: --config /app/config.json
    networks:
      - proxy_proxy-net

  docling-serve:
    image: quay.io/docling-project/docling-serve-cpu
    container_name: docling-serve
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - DOCLING_SERVE_ENABLE_UI=true
      - DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
    networks:
      - proxy_proxy-net

  langfuse-server:
    image: langfuse/langfuse:2
    container_name: langfuse-server
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${LANGFUSE_DB_USER}:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/${LANGFUSE_DB_NAME}
      - NEXTAUTH_SECRET=${LANGFUSE_NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${LANGFUSE_NEXTAUTH_URL}
      - SALT=${LANGFUSE_SALT}
      - ENCRYPTION_KEY=${LANGFUSE_ENCRYPTION_KEY} # generate via `openssl rand -hex 32`
      - TELEMETRY_ENABLED=${TELEMETRY_ENABLED:-true}
    networks:
      - proxy_proxy-net

  langfuse-db:
    image: postgres
    container_name: langfuse-db
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 3s
      timeout: 3s
      retries: 10
    environment:
      - POSTGRES_USER=${LANGFUSE_DB_USER}
      - POSTGRES_PASSWORD=${LANGFUSE_DB_PASSWORD}
      - POSTGRES_DB=${LANGFUSE_DB_NAME}
    volumes:
      - ${VOLUMES_BASEDIR}/langfuse/db:/var/lib/postgresql/data
    networks:
      - proxy_proxy-net

  perplexica:
    image: itzcrazykns1337/perplexica:main
    container_name: perplexica
    restart: unless-stopped
    environment:
      - DATA_DIR=/home/perplexica
    volumes:
      - ${VOLUMES_BASEDIR}/perplexica/backend-dbstore:/home/perplexica/data
      - ${VOLUMES_BASEDIR}/perplexica/uploads:/home/perplexica/uploads
      - ${VOLUMES_BASEDIR}/perplexica/config.toml:/home/perplexica/config.toml
    networks:
      - proxy_proxy-net

networks:
  proxy_proxy-net:
    external: true

volumes:
  hermes-agent-src: