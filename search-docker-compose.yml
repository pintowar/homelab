name: 'search'

services:
  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    depends_on:
      searxng-redis:
        condition: service_healthy
      tor-proxy:
        condition: service_healthy
    volumes:
      - ${VOLUMES_BASEDIR}/searxng/searxng:/etc/searxng:rw
    environment:
      - FORCE_OWNERSHIP=true
      - SEARXNG_SECRET=${SEARXNG_SECRET:-secret}
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME:-localhost}/
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS:-4}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS:-4}
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - proxy_proxy-net

  searxng-redis:
    image: docker.io/valkey/valkey:8-alpine
    container_name: searxng-redis
    restart: unless-stopped
#    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - "${VOLUMES_BASEDIR}/searxng/redis:/data"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - proxy_proxy-net

  tor-proxy:
    image: dperson/torproxy
    container_name: tor-proxy
    restart: unless-stopped
    environment:
      - TOR_NewCircuitPeriod=120  # Force new circuit every 120 seconds (optional)
    healthcheck:
      test: ["CMD", "curl", "-f", "socks5h://localhost:9050", "https://check.torproject.org"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - proxy_proxy-net

networks:
  proxy_proxy-net:
    external: true
