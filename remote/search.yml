name: 'search'

services:
  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    user: ${PUID}:${PGID}
    depends_on:
      searxng-redis:
        condition: service_healthy
    volumes:
      - ${VOLUMES_BASEDIR}/searxng:/etc/searxng:rw
    environment:
      - FORCE_OWNERSHIP=false
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - SEARXNG_BASE_URL=https://${SEARXNG_HOSTNAME}/
      - UWSGI_WORKERS=${SEARXNG_UWSGI_WORKERS:-2}
      - UWSGI_THREADS=${SEARXNG_UWSGI_THREADS:-2}
    networks:
      - remote_default
      - searxng_internal
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE

  searxng-redis:
    image: docker.io/valkey/valkey:9-alpine
    container_name: searxng-redis
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - searxng-redis-data:/data
    networks:
      - searxng_internal
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 3

  # tor-proxy:
  #   image: dperson/torproxy
  #   container_name: tor-proxy
  #   restart: unless-stopped
  #   environment:
  #     - TOR_NewCircuitPeriod=120  # Force new circuit every 120 seconds (optional)
  #   healthcheck:
  #     test: ["CMD", "curl", "-f", "socks5h://localhost:9050", "https://check.torproject.org"]
  #     interval: 20s
  #     timeout: 10s
  #     retries: 5
  #     start_period: 30s
  #   networks:
  #     - searxng_internal

volumes:
  searxng-redis-data:

networks:
  remote_default:
    external: true
  searxng_internal:
    internal: true