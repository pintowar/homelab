name: 'media'

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: always #unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PK} # <--- Paste key from Step 1
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES} # <--- Required for NordVPN
      - SERVER_COUNTRIES=${TUN_COUNTRIES} # Optional: Pick your country
      - TZ=${TIMEZONE}
      - WIREGUARD_MTU=1360
      - DNS_SERVER=on
    networks:
      - proxy_proxy-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9999 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/qbittorrent/config:/config
      - ${VOLUMES_ASSETS}/Downloads/torrents:/downloads
    # CRITICAL: Route network through Gluetun
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/prowlarr/config:/config
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  byparr:
    image: ghcr.io/thephaseless/byparr:latest
    container_name: byparr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PORT=8191
      - LOG_LEVEL=info
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy

  bazarr:
    image: ghcr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_ASSETS}/Videos/radarr/movies:/movies
      - ${VOLUMES_ASSETS}/Videos/sonarr:/tv
      - ${VOLUMES_BASEDIR}/bazarr/appdata/config:/config
    networks:
      - proxy_proxy-net

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/radarr/appdata/config:/config
      - ${VOLUMES_ASSETS}/Downloads/torrents:/downloads
      - ${VOLUMES_ASSETS}/Videos/radarr/movies:/movies
      - ${VOLUMES_ASSETS}/Videos/radarr/anime:/anime
    networks:
      - proxy_proxy-net

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/sonarr/appdata/config:/config
      - ${VOLUMES_ASSETS}/Videos/sonarr/tv:/tv
      - ${VOLUMES_ASSETS}/Downloads/torrents:/downloads
    networks:
      - proxy_proxy-net

  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    group_add:
      - "993"
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/jellyfin/config:/config
      - ${VOLUMES_ASSETS}/Videos:/data
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    networks:
      - proxy_proxy-net

  seerr:
    image: ghcr.io/seerr-team/seerr:latest
    init: true
    container_name: seerr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
    volumes:
      - ${VOLUMES_BASEDIR}/seerr/config:/app/config
    networks:
      - proxy_proxy-net
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:5055/api/v1/settings/public || exit 1
      start_period: 20s
      timeout: 3s
      interval: 15s
      retries: 3

networks:
  proxy_proxy-net:
    external: true
