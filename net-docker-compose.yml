name: 'net'

services:
  unbound:
    image: mvance/unbound:latest
    container_name: unbound
    restart: unless-stopped
    volumes:
      - ${VOLUMES_BASEDIR}/unbound/unbound.conf:/opt/unbound/etc/unbound/unbound.conf
    healthcheck:
      # Uses drill to query localhost on port 53 for google.com
      test: ["CMD-SHELL", "drill @127.0.0.1 -p 5335 google.com || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - proxy_proxy-net

  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    restart: unless-stopped
    depends_on:
      - unbound
    environment:
      - DNSMASQ_USER=pihole
      - WEBPASSWORD=${PIHOLE_PASSWD}
      - TZ=${TIMEZONE}
      - PIHOLE_DNS_=unbound#5335
    volumes:
      - ${VOLUMES_BASEDIR}/pihole/dnsmasq.d:/etc/dnsmasq.d
      - ${VOLUMES_BASEDIR}/pihole/pihole:/etc/pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      # - "67:67/udp" # Only required if you are using Pi-hole as your DHCP server
    networks:
      - proxy_proxy-net
    # cap_add:
    #   - NET_ADMIN # Required if you are using Pi-hole as your DHCP server, else not needed

networks:
  proxy_proxy-net:
    external: true
