name: 'media'

services:
  gluetun:
    image: qmcgaw/gluetun
    container_name: gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=nordvpn
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PK} # <--- Paste key from Step 1
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES} # <--- Required for NordVPN
      - SERVER_COUNTRIES=${TUN_COUNTRIES} # Optional: Pick your country
      - TZ=${TIMEZONE}
    networks:
      - proxy_proxy-net

  qbittorrent:
    image: linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - WEBUI_PORT=8080
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/qbittorrent/config:/config
      - ${VOLUMES_ASSETS}/Downloads/torrents:/downloads
    # CRITICAL: Route network through Gluetun
    network_mode: "service:gluetun"
    depends_on:
      - gluetun

  prowlarr:
    image: ghcr.io/hotio/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/prowlarr/config:/config
    network_mode: "service:gluetun"
    depends_on:
      - gluetun

  bazarr:
    image: ghcr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_ASSETS}/Videos/radarr/movies:/movies
      - ${VOLUMES_ASSETS}/Videos/sonarr:/tv
      - ${VOLUMES_BASEDIR}/bazarr/appdata/config:/config
    networks:
      - proxy_proxy-net

  radarr:
    image: ghcr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/radarr/appdata/config:/config
      - ${VOLUMES_ASSETS}/Downloads/torrents:/downloads
      - ${VOLUMES_ASSETS}/Videos/radarr/movies:/movies
      - ${VOLUMES_ASSETS}/Videos/radarr/anime:/anime
    networks:
      - proxy_proxy-net

  sonarr:
    image: ghcr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    depends_on:
      - qbittorrent
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/sonarr/appdata/config:/config
      - ${VOLUMES_ASSETS}/Videos/sonarr/tv:/tv
      - ${VOLUMES_ASSETS}/Downloads/torrents:/downloads
    networks:
      - proxy_proxy-net

  jellyfin:
    image: linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    group_add:
      - "993"
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/jellyfin/config:/config
      - ${VOLUMES_ASSETS}/Videos:/data
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
    networks:
      - proxy_proxy-net

  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    restart: unless-stopped
    group_add:
      - "110"
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
      - VERSION=docker
    volumes:
      - ${VOLUMES_BASEDIR}/plex/config:/config
      - ${VOLUMES_BASEDIR}/plex/transcode:/transcode
      - ${VOLUMES_ASSETS}/Videos/radarr/movies:/media/movies
      - ${VOLUMES_ASSETS}/Videos/radarr/anime:/media/anime
      - ${VOLUMES_ASSETS}/Videos/sonarr/tv:/media/tv
    devices:
      - /dev/dri:/dev/dri
    ports:
      - 32400:32400/tcp
      - 8324:8324/tcp
      - 32469:32469/tcp
      - 1900:1900/udp
      - 32410:32410/udp
      - 32412:32412/udp
      - 32413:32413/udp
      - 32414:32414/udp
    networks:
      - proxy_proxy-net

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/jellyseerr/config:/app/config
    networks:
      - proxy_proxy-net

  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    restart: unless-stopped
    environment:
      - TZ=${TIMEZONE}
      - PUID=${PUID}
      - PGID=${PGID}
    volumes:
      - ${VOLUMES_BASEDIR}/kavita/config:/config
      - ${VOLUMES_ASSETS}/Books:/data
    networks:
      - proxy_proxy-net

networks:
  proxy_proxy-net:
    external: true
